# Enterprise-Grade CDC Blueprint (Skeleton)
# Note: This is for architectural reference, not intended for local 8GB RAM machines.

services:
  # 3-Node Kafka Cluster (KRaft Mode)
  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3

  kafka-2:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'

  kafka-3:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'

  # Distributed Debezium Workers
  connect-worker-1:
    image: debezium/connect:2.4
    environment:
      GROUP_ID: debezium-cluster
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 3
      OFFSET_STORAGE_REPLICATION_FACTOR: 3
      STATUS_STORAGE_REPLICATION_FACTOR: 3

  connect-worker-2:
    image: debezium/connect:2.4
    environment:
      GROUP_ID: debezium-cluster
      # Same topics as worker-1 to form a cluster

  # Schema Registry for Data Integrity
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on: [kafka-1, kafka-2, kafka-3]

  # Monitoring Stack
  prometheus:
    image: prom/prometheus
  
  grafana:
    image: grafana/grafana
